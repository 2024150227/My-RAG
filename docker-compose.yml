version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: rag_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: rag_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: rag_db
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  api:
    build: .
    container_name: rag_api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      - redis
      - mysql
    volumes:
      - ./chromadb_data:/app/chromadb_data
      - ./uploads:/app/uploads
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  gradio:
    build: .
    container_name: rag_gradio
    ports:
      - "7860:7860"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
    command: [ "python", "app/frontend/gradio_app.py" ]

volumes:
  redis_data:
  mysql_data:
